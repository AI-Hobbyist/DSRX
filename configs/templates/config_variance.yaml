base_config:
  - configs/original/variance.yaml

dictionaries:
  zh: dictionaries/opencpop-extension.txt
all_phonemes: [AP, SP]
extra_phonemes: []
merged_phoneme_groups: []

datasets:
  - raw_data_dir: data/xxx1/raw
    speaker: speaker1
    spk_id: 0
    language: zh
    test_prefixes:
      - wav1
      - wav2
      - wav3
      - wav4
      - wav5
  - raw_data_dir: data/xxx2/raw
    speaker: speaker2
    spk_id: 1
    language: zh
    test_prefixes:
      - wav1
      - wav2
      - wav3
      - wav4
      - wav5

binary_data_dir: data/xxx/binary
binarization_args:
  num_workers: 0
  allow_missing_phonemes: false
pe: parselmouth
pe_ckpt: 'ckpt/rmvpe/model.pt'
hnsep: vr
hnsep_ckpt: 'ckpt/vr/model.pt'

use_lang_id: false
num_lang: 1
use_spk_id: false
num_spk: 1
# NOTICE: before enabling variance modules, please read the docs at
# https://github.com/openvpi/DiffSinger/tree/main/docs/BestPractices.md#mutual-influence-between-variance-modules
predict_dur: false
predict_pitch: false
# NOTICE: before enabling variance predictions, please read the docs at
# https://github.com/openvpi/DiffSinger/tree/main/docs/BestPractices.md#choosing-variance-parameters
predict_energy: false
predict_breathiness: false
predict_voicing: false
predict_tension: false

energy_db_min: -96.0
energy_db_max: -12.0

breathiness_db_min: -96.0
breathiness_db_max: -20.0

voicing_db_min: -96.0
voicing_db_max: -12.0

tension_logit_min: -10.0
tension_logit_max: 10.0

enc_ffn_kernel_size: 3
enc_attention_type: normal
use_rope: true
hidden_size: 256
dur_prediction_args:
  arch: resnet
  hidden_size: 256
  dropout: 0.1
  num_layers: 5
  kernel_size: 3
  log_offset: 1.0
  loss_type: mse
  lambda_pdur_loss: 0.3
  lambda_wdur_loss: 1.0
  lambda_sdur_loss: 3.0

use_melody_encoder: false
melody_encoder_args:
  hidden_size: 128
  enc_layers: 4
use_glide_embed: false
glide_types: [up, down]
glide_embed_scale: 11.313708498984760  # sqrt(128)

diffusion_type: reflow

pitch_prediction_args:
  pitd_norm_min: -8.0
  pitd_norm_max: 8.0
  pitd_clip_min: -12.0
  pitd_clip_max: 12.0
  repeat_bins: 64
  backbone_type: 'lynxnet2'
  backbone_args:
    num_layers: 6
    num_channels: 512
    dropout_rate: 0.0

  # backbone_type: 'wavenet'
  # backbone_args:
  #   num_layers: 20
  #   num_channels: 256
  #   dilation_cycle_length: 5 

variances_prediction_args:
  total_repeat_bins: 48
  backbone_type: 'lynxnet2'
  backbone_args:
    num_layers: 6
    num_channels: 384
    dropout_rate: 0.0

  # backbone_type: 'wavenet'
  # backbone_args:
  #   num_layers: 10
  #   num_channels: 192
  #   dilation_cycle_length: 4

lambda_dur_loss: 1.0
lambda_pitch_loss: 1.0
lambda_var_loss: 1.0

optimizer_args:
  optimizer_cls: modules.optimizer.muon.Muon_AdamW
  lr: 0.0006
  muon_args:
    weight_decay: 0.1
  adamw_args:
    weight_decay: 0.0
lr_scheduler_args:
  step_size: 5000
  gamma: 0.8
max_batch_frames: 80000
max_batch_size: 48
max_updates: 100000

num_valid_plots: 10
val_check_interval: 2000
# Optional .ds validation synthesis during variance training.
# ds_val_spks: speakers to validate.  If empty/null, auto-detected from
#   datasets entries with non-empty test_prefixes.
# Speakers must exist in the acoustic model's spk_map.
#
# ============================================================
# Template A: All-in-one 模型 (dur + pitch + variance 都在当前模型)
#   predict_dur: true
#   predict_pitch: true
#   predict_energy: true      # 或其他 variance 参数
#   variance_ckpts 留空即可，所有 stage 由当前模型处理
# ============================================================
# val_with_ds:
#   acoustic_ckpt_dir: ckpt/acoustic_xxx
#   ds_files:
#     - samples/valid/song1.ds
#     - path: samples/valid/song2.ds    # dict 形式可指定 lang
#       lang: jpn
#   ds_val_spks:
#     - speaker1
#
# ============================================================
# Template B: 分模型 (如只训 pitch，dur/variance 靠外部 ckpt)
#   predict_dur: false
#   predict_pitch: true
#   predict_energy: false     # 全关
#   variance_ckpts 必须指定 dur 和 variance 的外部 ckpt
# ============================================================
# val_with_ds:
#   acoustic_ckpt_dir: ckpt/acoustic_xxx
#   variance_ckpts:
#     dur:
#       ckpt_dir: ckpt/dur_xxx
#     variance:
#       ckpt_dir: ckpt/variance_xxx
#   ds_files:
#     - samples/valid/song1.ds
#     - path: samples/valid/song2.ds
#       lang: jpn
#   ds_val_spks:
#     - speaker1
#
# ============================================================
# Template C: 只训 variance 参数 (dur/pitch 靠外部 ckpt)
#   predict_dur: false
#   predict_pitch: false
#   predict_energy: true
#   variance_ckpts 必须指定 dur 和 pitch 的外部 ckpt
# ============================================================
# val_with_ds:
#   acoustic_ckpt_dir: ckpt/acoustic_xxx
#   variance_ckpts:
#     dur:
#       ckpt_dir: ckpt/dur_xxx
#     pitch:
#       ckpt_dir: ckpt/pitch_xxx
#   ds_files:
#     - samples/valid/song1.ds
#   ds_val_spks:
#     - speaker1
val_with_ds:
  acoustic_ckpt_dir: null
  acoustic_ckpt_steps: null
  acoustic_vocoder: true
  release_acoustic_after_val: false
  release_variance_after_val: false
  show_progress: true
  verbose: false
  # Optional per-stage inference step overrides. null = use each model config.
  infer_steps:
    dur: null
    pitch: null
    variance: null
    acoustic: null
  # overwrite_*: force re-prediction even if .ds already has the value
  overwrite_ds_dur: false
  overwrite_ds_pitch: false
  overwrite_ds_var: false
  variance_ckpts:
    dur:
      ckpt_dir: null
      ckpt_steps: null
    pitch:
      ckpt_dir: null
      ckpt_steps: null
    variance:
      ckpt_dir: null
      ckpt_steps: null
  max_samples_per_val: null
  seed: -1
  # Each ds_files entry can be:
  #   - a plain path string
  #   - {path: ..., lang: ...}  dict, where lang overrides the .ds file's language
  ds_files: []
  # ds_val_spks: empty = auto-detect from datasets with test_prefixes
  ds_val_spks: []
num_ckpt_keep: 5
permanent_ckpt_start: 60000
permanent_ckpt_interval: 10000
pl_trainer_devices: 'auto'
pl_trainer_precision: '16-mixed'
